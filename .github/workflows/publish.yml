name: publish

# Publish to the VS Code Marketplace and Open VSX when a GitHub Release is
# published. The Release is the human gate: cut it (see RELEASING.md) and
# this packages the extension once and ships the identical .vsix to both
# registries, then attaches it to the Release.
on:
  release:
    types: [published]

# One publish per release tag; don't cancel an in-flight publish.
concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the .vsix asset to the Release
    env:
      # Bind untrusted release metadata to an env var rather than
      # interpolating ${{ }} directly into run scripts (script-injection
      # safe). VSIX name is derived from it.
      TAG: ${{ github.event.release.tag_name }}
      VSIX: pgrls-${{ github.event.release.tag_name }}.vsix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Verify release tag matches package.json version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v$pkg" ]; then
            echo "::error::release tag '$TAG' does not match package.json version 'v$pkg'"
            exit 1
          fi
          echo "tag $TAG matches package.json v$pkg"

      # vsce and ovsx are hash-locked devDependencies installed by the
      # `npm ci` above; invoke the local binaries directly so nothing is
      # fetched from the network while the publish tokens are in the
      # environment. Package once (runs `vscode:prepublish` -> compile)
      # so both registries get a byte-identical artifact.
      - name: Package extension
        run: node_modules/.bin/vsce package -o "$VSIX"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: node_modules/.bin/vsce publish --packagePath "$VSIX"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: node_modules/.bin/ovsx publish "$VSIX"

      - name: Attach .vsix to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "$VSIX" --clobber
